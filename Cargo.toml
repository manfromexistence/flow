[package]
name = "cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "tui"
path = "src/main.rs"

[dependencies]
# Terminal UI
ratatui = "0.30"
crossterm = "0.28"

# Async Runtime
tokio = { version = "1.42", features = ["full"] }

# LLM
llama-cpp-2 = "0.1"
sysinfo = "0.32"

# Error Handling
anyhow = "1.0"

# Time
chrono = "0.4"

# FIGlet fonts
dx-font = { path = "./font" }

# Animations
tachyonfx = { path = "./tachyonfx" }

# Color/palette for effects
palette = "0.7"
rand = "0.8"

# Clipboard
cli-clipboard = "0.4"

# FIGlet rendering
figlet-rs = "0.1"

# Token counting
tiktoken-rs = "0.9"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
