[package]
name = "cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "tui"
path = "src/main.rs"

[dependencies]
# Terminal UI
ratatui = "0.30"
crossterm = "0.28"

# Async Runtime
tokio = { version = "1.42", features = ["full"] }

# HTTP client
# reqwest = { version = "0.12", features = ["json", "gzip", "brotli", "deflate"] }

# Serialization
# serde_json = "1.0"

# LLM
llama-cpp-2 = "0.1"
sysinfo = "0.32"

# Error Handling
anyhow = "1.0"

# Time
chrono = "0.4"

# FIGlet fonts
dx-font = { path = "./font" }

# Animations
tachyonfx = { path = "./tachyonfx" }

# Animation crates
noise = "0.9"
bracket-noise = "0.8"
charmed-harmonica = "0.1"
spinners = "4.1"
indicatif = "0.17"
coolor = "1.0"
palette = "0.7"
terminal_size = "0.4"
owo-colors = { version = "4.0", features = ["supports-colors"] }
rand = "0.8"

# Clipboard
cli-clipboard = "0.4"

# FIGlet rendering
figlet-rs = "0.1"

# Token counting
tiktoken-rs = "0.9"

# [build-dependencies]
# serializer = { package = "dx-serializer", path = "./serializer" }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
