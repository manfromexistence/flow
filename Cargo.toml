# ──────────────────────────────────────────────
#  Package
# ──────────────────────────────────────────────

[package]
name = "cli"
version = "0.1.0"
edition = "2024"
default-run = "tui"

# ──────────────────────────────────────────────
#  Binaries
# ──────────────────────────────────────────────

[[bin]]
name = "tui"
path = "src/tui.rs"

[[bin]]
name = "onboard"
path = "src/onboard.rs"

[[bin]]
name = "local"
path = "src/local.rs"

# ──────────────────────────────────────────────
#  Dependencies
# ──────────────────────────────────────────────

[dependencies]

# CLI Framework
clap = { version = "4.5", features = ["derive", "env", "string", "wrap_help"] }

# Terminal UI
console = "0.15"
owo-colors = { version = "4.0", features = ["supports-colors"] }
dialoguer = { version = "0.11", features = ["fuzzy-select"] }
ratatui = "0.29"
crossterm = "0.28"
indicatif = { version = "0.17", features = ["rayon", "tokio"] }
cli-clipboard = "0.4"
term_size = "0.3"

# CLI Animations & Effects
tachyonfx = "0.15"
colorgrad = "0.7"
ratatui-splash-screen = "0.1"
ratatui-notifications = "0.1"
snailshell = "0.2"

# Markdown Rendering
termimad = "0.30"

# Colors / Text
strsim = "0.11.1"
textwrap = "0.16"
figlet-rs = "0.1"
fuzzy-matcher = "0.3"
colored = "3.0"                                                                  # ↑ bumped from 2.1 (llm needs ≥3.0)

# ASCII Art & Image Processing
artem = "3.0"
viuer = "0.8"
image = { version = "0.25", features = ["jpeg", "png", "webp", "gif", "avif"] }
fast_image_resize = "4.2"

# SVG Rendering
resvg = "0.44"
usvg = "0.44"
tiny-skia = "0.11"

# GPU Acceleration
wgpu = "22.1"
pollster = "0.3"

# Audio
rodio = "0.19"
cpal = "0.15"
hound = "3.5"
mel_spec = "0.2"

# ML / Inference (ONNX + Candle)
ort = { version = "2.0.0-rc.12", features = ["load-dynamic"] }                  # ← merged from llm
candle-core = "0.8"
candle-nn = "0.8"
candle-transformers = "0.8"
# tokenizers = "0.20"  # Removed due to CRT conflict with llama-cpp-2

# Math / Arrays
ndarray = "0.16"
num-complex = "0.4"

# Serialization / Configuration
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
base64 = "0.22"

# Logging / Tracing
tracing = "0.1"                                                                  # ← merged from llm
tracing-subscriber = { version = "0.3", features = ["env-filter"] }              # ← merged from llm

# Async Runtime
tokio = { version = "1.42", features = ["full", "parking_lot"] }
futures = "0.3"
futures-core = "0.3"
futures-util = "0.3"
async-stream = "0.3"
async-trait = "0.1"

# Networking / HTTP
reqwest = { version = "0.12", features = ["blocking", "json", "rustls-tls", "stream"] }
ureq = "2.12"
oauth2 = "4.4"
webbrowser = "1.0"
url = "2.5"
tokio-tungstenite = "0.24"
watch = "0.2.3"

# Database
libsql = "0.9"

# Security
argon2 = "0.5"
keyring = "3.6"
zeroize = { version = "1.8", features = ["derive"] }

# LLM / AI
genai = "0.5.3"
ollama-rs = "0.3.4"
copilot-client = "0.1.0"
copilot-sdk-supercharged = "1.0.15"
hf-hub = "0.3"
llama-cpp-2 = "0.1"
sysinfo = "0.32"

# File System
walkdir = "2.5"
ignore = "0.4"
glob = "0.3"
regex = "1.10"

# Random
rand = "0.8"
getrandom = "0.2"
uuid = { version = "1.10", features = ["v4"] }

# Utilities
anyhow = "1.0"
thiserror = "2.0"
chrono = { version = "0.4", features = ["serde"] }
once_cell = "1.20"
dirs = "5.0"
home = "0.5"
which = "7.0"
dotenvy = "0.15"
ctrlc = "3.5"                                                                   # ↑ bumped from 3.4 (llm needs ≥3.5)
atty = "0.2"

# Performance
memmap2 = "0.9"
bytemuck = "1.14"
parking_lot = "0.12"
crossbeam = "0.8"
rayon = "1.10"

# Local Path Dependencies
dx-font = { path = "F:/Desktop/integrations/tool-tui/crates/font" }

# ──────────────────────────────────────────────
#  Platform-specific Dependencies
# ──────────────────────────────────────────────

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
libc = "0.2"
winapi = { version = "0.3", features = [                                         # ← merged from llm
    "winbase",
    "fileapi",
    "handleapi",
    "winnt",
    "processenv",
] }

# ──────────────────────────────────────────────
#  Features
# ──────────────────────────────────────────────

[features]
default = []

# ──────────────────────────────────────────────
#  Dev / Build Dependencies
# ──────────────────────────────────────────────

[dev-dependencies]
httpmock = "0.7"

[build-dependencies]
serializer = { package = "dx-serializer", path = "F:/Desktop/integrations/tool-tui/crates/serializer" }

# ──────────────────────────────────────────────
#  Profiles (merged from llm)
# ──────────────────────────────────────────────

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"

[profile.release.package."*"]
opt-level = 3